name: Build and push Docker images (amd64)

on:
  push:
    branches: [ main ]
    paths:
      - 'docker/**'
      - 'ansible/**'
      - 'setup-dev-env.sh'
      - 'env/**'
      - 'ansible-galaxy-requirements.yaml'
      - 'mowbot.repos'
      - 'ansible/playbooks/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'docker/**'
      - 'ansible/**'
      - 'setup-dev-env.sh'
      - 'env/**'
      - 'ansible-galaxy-requirements.yaml'
      - 'mowbot.repos'
      - 'ansible/playbooks/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-amd64:
    name: Build runtime and devel (linux/amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.12.0
          buildkitd-flags: --debug

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add GitHub to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Install vcstool
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip install vcstool

      - name: Compute version tag
        id: ver
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        run: |
          set -eux
          cd "${GITHUB_WORKSPACE}/docker"
          chmod +x build.sh
          TAG="${{ steps.ver.outputs.tag }}"
          PUSH=()
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            PUSH=(--push)
          fi
          ./build.sh --platform amd64 --target runtime --version "${TAG}" "${PUSH[@]}"
          ./build.sh --platform amd64 --target devel --version "${TAG}" "${PUSH[@]}"

      - name: Tag latest aliases (main branch, non-PR)
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          set -eux
          TAG="${{ steps.ver.outputs.tag }}"
          IMG=ghcr.io/serene4mr/mowbot
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker buildx imagetools create -t "${IMG}:runtime-amd64-latest" "${IMG}:runtime-amd64-${TAG}"
          docker buildx imagetools create -t "${IMG}:devel-amd64-latest" "${IMG}:devel-amd64-${TAG}"

      - name: Post summary
        if: always()
        run: |
          echo "Images (example names):"
          echo "  ghcr.io/serene4mr/mowbot:runtime-amd64-${{ steps.ver.outputs.tag }}"
          echo "  ghcr.io/serene4mr/mowbot:devel-amd64-${{ steps.ver.outputs.tag }}"
