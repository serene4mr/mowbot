name: Build and Push Docker Images

on:
  push:
    branches: [ main ]
    paths:
      - 'docker/**'
      - 'ansible/**'
      - 'setup-dev-env.sh'
      - '*.env'
      - 'ansible-galaxy-requirements.yaml'
      - 'mowbot.repos'
  pull_request:
    branches: [ main ]
    paths:
      - 'docker/**'
      - 'ansible/**'
      - 'setup-dev-env.sh'
      - '*.env'
      - 'ansible-galaxy-requirements.yaml'
      - 'mowbot.repos'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  VERSION: ${{ github.sha }}

jobs:
  build-base:
    name: Build Base (${{ matrix.platform }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.12.0
          buildkitd-flags: --debug

      - name: Setup SSH key and agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add GitHub host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Set up QEMU for multi-platform
        if: matrix.platform == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Install vcstool
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip install vcstool

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          export GIT_TERMINAL_PROMPT=0

      - name: Compute Workflow Tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Base Image
        run: |
          set -eu
          cd docker
          chmod +x build.sh
          TAG=${{ steps.tags.outputs.tag }}

          ./build.sh --target base --platform linux/${{ matrix.platform }} --version $VERSION

          docker tag ghcr.io/serene4mr/mowbot:base ghcr.io/serene4mr/mowbot:base-${TAG}-${{ matrix.platform }}
          docker push ghcr.io/serene4mr/mowbot:base-${TAG}-${{ matrix.platform }}

  create-manifest:
    name: Create Multi-Arch Manifest
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Compute Workflow Tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "push_latest=false" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "push_latest=true" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          TAG=${{ steps.tags.outputs.tag }}
          
          docker manifest create ghcr.io/serene4mr/mowbot:base-${TAG} \
            ghcr.io/serene4mr/mowbot:base-${TAG}-amd64 \
            ghcr.io/serene4mr/mowbot:base-${TAG}-arm64
          docker manifest push ghcr.io/serene4mr/mowbot:base-${TAG}

          if [ "${{ steps.tags.outputs.push_latest }}" = "true" ]; then
            docker manifest create ghcr.io/serene4mr/mowbot:base \
              ghcr.io/serene4mr/mowbot:base-${TAG}-amd64 \
              ghcr.io/serene4mr/mowbot:base-${TAG}-arm64
            docker manifest push ghcr.io/serene4mr/mowbot:base
          fi

  build-cuda:
    name: Build CUDA (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.12.0
          buildkitd-flags: --debug

      - name: Setup SSH key and agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add GitHub host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Install vcstool
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip install vcstool

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          export GIT_TERMINAL_PROMPT=0

      - name: Compute Workflow Tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "push_latest=false" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "push_latest=true" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Aggressive cleanup before CUDA build
        run: |
          set -eu
          docker system prune -af --volumes
          sudo apt-get clean
          sudo apt-get autoremove -y
          sudo rm -rf /var/lib/apt/lists/*
          sudo rm -rf /var/tmp/*
          df -h

      - name: Build and push CUDA image
        run: |
          set -eu
          cd docker
          TAG=${{ steps.tags.outputs.tag }}

          ./build.sh --target main-dev-cuda --platform linux/amd64 --version $VERSION
          
          docker push ghcr.io/serene4mr/mowbot:main-dev-cuda-$VERSION
          
          docker tag ghcr.io/serene4mr/mowbot:main-dev-cuda-$VERSION ghcr.io/serene4mr/mowbot:main-dev-cuda-${TAG}
          docker push ghcr.io/serene4mr/mowbot:main-dev-cuda-${TAG}

          if [ "${{ steps.tags.outputs.push_latest }}" = "true" ]; then
            docker tag ghcr.io/serene4mr/mowbot:main-dev-cuda-$VERSION ghcr.io/serene4mr/mowbot:main-dev-cuda
            docker push ghcr.io/serene4mr/mowbot:main-dev-cuda
          fi

      - name: Final cleanup
        if: always()
        run: |
          docker system prune -af --volumes
          echo "✅ All Docker images built and pushed successfully!"
