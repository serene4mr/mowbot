- name: Remove pip-installed TensorRT packages that shadow apt bindings
  become: true
  ansible.builtin.shell: |
    python3 -m pip uninstall -y tensorrt tensorrt-cu11 tensorrt-cu12 tensorrt-cu13 || true
    rm -rf /usr/local/lib/python3.10/dist-packages/tensorrt*
  args:
    executable: /bin/bash
  changed_when: false

- name: Install cuDNN and TensorRT runtime packages
  become: true
  ansible.builtin.apt:
    name:
      - "libcudnn8={{ cudnn_version }}"
      - "libnvinfer8={{ tensorrt_version }}"
      - "libnvinfer-plugin8={{ tensorrt_version }}"
      - "libnvinfer-vc-plugin8={{ tensorrt_version }}"
      - "libnvinfer-lean8={{ tensorrt_version }}"
      - "libnvinfer-dispatch8={{ tensorrt_version }}"
      - "libnvonnxparsers8={{ tensorrt_version }}"
      - "libnvparsers8={{ tensorrt_version }}"
      - "python3-libnvinfer={{ tensorrt_version }}"
      - "python3-libnvinfer-lean={{ tensorrt_version }}"
      - "python3-libnvinfer-dispatch={{ tensorrt_version }}"
    allow_change_held_packages: true
    allow_downgrade: true
    update_cache: true

- name: Install cuDNN and TensorRT development packages
  become: true
  ansible.builtin.apt:
    name:
      - "libcudnn8-dev={{ cudnn_version }}"
      - "libnvinfer-dev={{ tensorrt_version }}"
      - "libnvinfer-plugin-dev={{ tensorrt_version }}"
      - "libnvinfer-headers-dev={{ tensorrt_version }}"
      - "libnvinfer-headers-plugin-dev={{ tensorrt_version }}"
      - "libnvonnxparsers-dev={{ tensorrt_version }}"
    allow_change_held_packages: true
    allow_downgrade: true
    update_cache: false
  when: install_devel == 'y'

# apt-mark hold (optional for stability)
- name: Prevent TensorRT runtime packages from upgrading
  become: true
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  with_items:
    - libcudnn8
    - libnvinfer8
    - libnvinfer-plugin8
    - libnvinfer-vc-plugin8
    - libnvinfer-lean8
    - libnvinfer-dispatch8
    - libnvonnxparsers8
    - libnvparsers8
    - python3-libnvinfer
    - python3-libnvinfer-lean
    - python3-libnvinfer-dispatch
  when: tensorrt_hold_packages | default(true) | bool

- name: Prevent TensorRT development packages from upgrading
  become: true
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  with_items:
    - libcudnn8-dev
    - libnvinfer-dev
    - libnvinfer-plugin-dev
    - libnvinfer-headers-dev
    - libnvinfer-headers-plugin-dev
    - libnvonnxparsers-dev
  when: install_devel == 'y' and tensorrt_hold_packages | default(true) | bool

# Verification tasks removed for faster builds - packages will fail if installation doesn't work