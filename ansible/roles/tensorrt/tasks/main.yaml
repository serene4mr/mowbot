- name: Install cuDNN and TensorRT runtime packages
  become: true
  ansible.builtin.apt:
    name:
      - "libcudnn8={{ cudnn_version }}"
      - "libnvinfer10={{ tensorrt_version }}"
      - "libnvinfer-plugin10={{ tensorrt_version }}"
      - "libnvonnxparsers10={{ tensorrt_version }}"
    allow_change_held_packages: true
    allow_downgrade: true
    update_cache: true

- name: Install cuDNN and TensorRT development packages
  become: true
  ansible.builtin.apt:
    name:
      - "libcudnn8-dev={{ cudnn_version }}"
      - "libnvinfer-dev={{ tensorrt_version }}"
      - "libnvinfer-plugin-dev={{ tensorrt_version }}"
      - "libnvinfer-headers-dev={{ tensorrt_version }}"
      - "libnvinfer-headers-plugin-dev={{ tensorrt_version }}"
      - "libnvonnxparsers-dev={{ tensorrt_version }}"
    allow_change_held_packages: true
    allow_downgrade: true
    update_cache: false
  when: install_devel == 'y'

# Python bindings — pin to the same version as the apt-installed libnvinfer to avoid CUDA ABI
# mismatch. Use tensorrt-cu12 (not the plain tensorrt meta-package) so pip selects the CUDA 12
# wheel rather than silently pulling cu13 libs on a CUDA 12 system.
- name: Install TensorRT Python wheel (CUDA 12) via pip
  ansible.builtin.pip:
    name: "tensorrt-cu12=={{ tensorrt_pip_version | default(tensorrt_version.split('-')[0]) }}"
    executable: pip3

# apt-mark hold (optional for stability)
- name: Prevent TensorRT runtime packages from upgrading
  become: true
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  with_items:
    - libcudnn8
    - libnvinfer10
    - libnvinfer-plugin10
    - libnvonnxparsers10
  when: tensorrt_hold_packages | default(true) | bool

- name: Prevent TensorRT development packages from upgrading
  become: true
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  with_items:
    - libcudnn8-dev
    - libnvinfer-dev
    - libnvinfer-plugin-dev
    - libnvinfer-headers-dev
    - libnvinfer-headers-plugin-dev
    - libnvonnxparsers-dev
  when: install_devel == 'y' and tensorrt_hold_packages | default(true) | bool

# Verification tasks removed for faster builds - packages will fail if installation doesn't work